name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build, Test and Validate Configs
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java Environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Compile code, run unit tests, and generate execution JARs
      - name: Build JARs with Maven
        run: mvn clean package -DskipTests=false

      # 4. Set up Docker Buildx for modern container building features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build Shortener Service Docker Image locally to verify the Dockerfile
      - name: Build Shortener Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./url-shortener-service
          file: ./url-shortener-service/Dockerfile
          push: false # Set to true later when you configure a Registry login step
          tags: url-shortener-service:latest

      # 6. Build Redirect Service Docker Image locally to verify the Dockerfile
      - name: Build Redirect Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./url-redirect-service
          file: ./url-redirect-service/Dockerfile
          push: false
          tags: url-redirect-service:latest

      # 7. Mock Deployment Step: Validate Docker Compose configurations
      - name: Validate Deployment Orchestration Files
        run: |
          echo "Validating Docker Compose orchestration matrix..."
          docker compose config --quiet
          echo "Configuration validation successful."

      # 8. Complete Pipeline
      - name: Finalize Mock Deployment
        run: |
          echo "========================================================"
          echo " SUCCESS: Build checks passed, images generated successfully."
          echo " Mock Deployment completed with zero errors."
          echo "========================================================"
