server:
  port: 8080

spring:
  application:
    name: url-shortener-service

  datasource:
    url: jdbc:postgresql://localhost:5432/short-It
    username: postgres
    password: admin@123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  cache:
    type: redis

zookeeper:
  connection-string: ${ZK_CONNECT:localhost:2181}
  session-timeout-ms: 30000
  connection-timeout-ms: 10000

app:
  base-url: ${BASE_URL:https://sho.rt}

  # Default TTL for all short URLs (days)
  # This is enforced in UrlShortenerService — not configurable per request
  url:
    default-ttl-days: 60

  # Cleanup cron — runs daily at 02:00 AM by default
  # Format: second minute hour day-of-month month day-of-week
  cleanup:
    cron: "0 0 2 * * *"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.urlshortener: DEBUG
    org.apache.curator: WARN
    org.apache.zookeeper: WARN
