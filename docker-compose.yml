version: '3.9'

# ============================================================
# URL Shortener System - Local Dev Stack
#
# Services:
#   postgres     - shared DB (both services connect here)
#   redis        - shared cache (both services use same cluster)
#   zookeeper    - worker ID coordination (shortener-service only)
#   shortener    - url-shortener-service  :8080
#   redirect     - url-redirect-service   :8081
# ============================================================

services:

  # ---- Infrastructure ----

  postgres:
    image: postgres:16-alpine
    container_name: urlshortener-postgres
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared-schema/V1__initial_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: urlshortener-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Application Services ----

  shortener:
    build:
      context: ./url-shortener-service
      dockerfile: Dockerfile
    container_name: url-shortener-service
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/short-It
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ZK_CONNECT: zookeeper:2181
      BASE_URL: http://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_started
    restart: on-failure
  redirect:
    build:
      context: ./url-redirect-service
      dockerfile: Dockerfile
    container_name: url-redirect-service
    ports:
      - "8081:8081"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/short-Ir=t
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    # Scale redirect-service independently:
    # docker compose up --scale redirect=3 -d
    deploy:
      replicas: 1

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_log:
